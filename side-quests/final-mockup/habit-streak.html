<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit - GNOTE</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page">
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <section class="screen">
        <div class="screen-header">
          <div>
            <p class="screen-label">Habit</p>
            <h1 class="title-lg">Track one habit at a time</h1>
          </div>
          <button class="secondary-btn habit-change-btn">Change</button>
        </div>

        <div class="hero-panel reveal habit-hero">
          <p class="section-label">Current habit</p>
          <p class="habit-name">Read 10 pages</p>
          <div class="habit-number">34</div>
          <p class="body-copy habit-support">streak</p>
        </div>

        <button class="primary-btn habit-cta reveal" id="habit-cta">Did it today</button>

        <div class="card reveal habit-success" id="habit-success" hidden>
          <p class="section-label">Done for today</p>
          <p class="body-copy">Come back tomorrow.</p>
        </div>
      </section>

      <nav class="phone-nav">
        <div class="nav-item">Anchor</div>
        <div class="nav-item">Daily 3</div>
        <div class="nav-item">Capture</div>
        <div class="nav-item active">Habit</div>
        <div class="nav-item">People</div>
      </nav>
    </div>

    <style>
      .habit-change-btn {
        min-width: 86px;
      }
      .habit-hero {
        margin-top: 20px;
        text-align: center;
        padding: 26px 20px;
      }
      .habit-name {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.35;
      }
      .habit-number {
        margin-top: 18px;
        font-size: 68px;
        font-weight: 800;
        letter-spacing: -0.06em;
      }
      .habit-support {
        text-transform: lowercase;
      }
      .habit-cta {
        width: 100%;
        height: 54px;
        margin-top: 20px;
      }
      .habit-success {
        margin-top: 20px;
        display: grid;
        gap: 8px;
      }
    </style>

    <script src="./script.js"></script>
    <script>
      const cta = document.getElementById('habit-cta');
      const success = document.getElementById('habit-success');
      cta.addEventListener('click', () => {
        cta.hidden = true;
        success.hidden = false;
      });
    </script>
  </body>
</html>
