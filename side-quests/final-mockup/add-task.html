<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Task - GNOTE</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page add-sheet-page">
    <div class="sheet-scrim">
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div>
            <p class="sheet-kicker">Add task</p>
            <h2 class="sheet-title">Add task</h2>
          </div>
          <button class="icon-btn">✕</button>
        </div>

        <div class="sheet-body">
          <div class="form-group">
            <label class="form-label">What needs to be done?</label>
            <input class="form-input" type="text" placeholder="Ship dashboard settings screen" />
          </div>
          <div class="form-group">
            <label class="form-label">How will you know it is done?</label>
            <input class="form-input" type="text" placeholder="Merged and testable on device" />
          </div>
          <div class="form-group">
            <label class="form-label">By when?</label>
            <input class="form-input" type="text" placeholder="16:00" />
          </div>
        </div>

        <div class="sheet-footer">
          <button class="secondary-btn">Cancel</button>
          <button class="primary-btn">Save task</button>
        </div>
      </div>
    </div>
  </body>
</html>
