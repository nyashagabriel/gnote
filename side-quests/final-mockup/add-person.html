<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Person - GNOTE</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page add-sheet-page">
    <div class="sheet-scrim">
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div>
            <p class="sheet-kicker">Add person</p>
            <h2 class="sheet-title">Add person</h2>
          </div>
          <button class="icon-btn">✕</button>
        </div>

        <div class="sheet-body">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input class="form-input" type="text" placeholder="Alex Rivers" />
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp number</label>
            <input class="form-input" type="text" placeholder="+263712345678" />
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <div class="role-select">
              <button class="role-option active">Motivator</button>
              <button class="role-option">Meditator</button>
            </div>
          </div>
        </div>

        <div class="sheet-footer">
          <button class="secondary-btn">Cancel</button>
          <button class="primary-btn">Save person</button>
        </div>
      </div>
    </div>
  </body>
</html>
