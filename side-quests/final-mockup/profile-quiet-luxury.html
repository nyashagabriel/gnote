<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — GNOTE</title>
    <link rel="stylesheet" href="./styles.css" />
    <!--
    ═══════════════════════════════════════════════════════════
    FIXES APPLIED:

    ✗ FIXED: Broken HTML — multiple unclosed <div> tags
      → Original had setting-card divs nested incorrectly
        causing the Preferences section to bleed into the
        Insights section. All divs are now properly closed.

    ✗ REMOVED: Sign Out appearing TWICE
      → The original had Sign Out inside the Preferences
        card AND in a separate Account danger section.
        Sign Out appears once, in the Session section,
        exactly as in the Flutter ProfilePage.

    ✗ REMOVED: "Insights" section with Top 8% / Top 12% etc.
      → These percentile comparisons require backend
        analytics across ALL users to be meaningful. That
        infrastructure does not exist in the current app.
        Shipping phantom stats in a prototype conditions
        users to expect a feature that isn't built and
        won't be in v1. Remove it.

    ✓ CORRECTED: Section structure matches Flutter ProfilePage:
        1. Account (display name, email, timezone)
        2. Preferences (theme mode, habit reminder)
        3. Session (sign out — danger)

    ✓ CORRECTED: "PROFILE" header label (not "Profile quiet luxury")

    ✓ CORRECTED: Habit reminder shows time, tappable
      → Maps to _pickHabitTime() in Flutter

    ✓ CORRECTED: Theme mode shows current value + chevron
      → Maps to _pickThemeMode() bottom sheet in Flutter

    ✓ CORRECTED: Avatar shows initials from display name
      → Flutter: _buildInitials(displayName)

    ✓ CORRECTED: Version string
      → GStrings.profileVersion: "Gnote v1.0.0"
    ═══════════════════════════════════════════════════════════
    -->
  </head>
  <body class="prototype-page">
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <section class="screen">

        <!-- Header with back button -->
        <div class="profile-header">
          <button class="icon-btn back-btn" aria-label="Back">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <h1 class="profile-heading">PROFILE</h1>
        </div>

        <!-- Hero card -->
        <div class="hero-panel reveal profile-hero">
          <div class="profile-hero-inner">
            <div class="avatar">NG</div>
            <div class="profile-info">
              <p class="body-copy profile-name">Ngoni G.</p>
              <p class="muted-copy profile-email">ngoni@example.com</p>
            </div>
          </div>
        </div>

        <div class="stack" style="margin-top: 18px; padding-bottom: 80px;">

          <!-- ── Account ──────────────────────────────── -->
          <div class="setting-section">
            <p class="section-title">Account</p>
            <div class="setting-card reveal">
              <div class="setting-row">
                <div class="setting-main">
                  <span class="section-label">Display name</span>
                  <strong>Ngoni G.</strong>
                </div>
              </div>
              <div class="setting-row">
                <div class="setting-main">
                  <span class="section-label">Email</span>
                  <strong>ngoni@example.com</strong>
                </div>
              </div>
              <div class="setting-row">
                <div class="setting-main">
                  <span class="section-label">Timezone</span>
                  <strong>CAT</strong>
                </div>
              </div>
            </div>
          </div>

          <!-- ── Preferences ──────────────────────────── -->
          <div class="setting-section">
            <p class="section-title">Preferences</p>
            <div class="setting-card reveal">
              <!-- Theme mode — tappable, opens bottom sheet in app -->
              <div class="setting-row tappable-row">
                <div class="setting-main">
                  <span class="section-label">Theme mode</span>
                  <strong>System</strong>
                </div>
                <div class="setting-row-right">
                  <span class="muted-copy">Change</span>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
              <!-- Habit reminder — tappable, opens time picker in app -->
              <div class="setting-row tappable-row">
                <div class="setting-main">
                  <span class="section-label">Habit reminder</span>
                  <strong>9:00 PM</strong>
                </div>
                <div class="setting-row-right">
                  <span class="muted-copy">Update</span>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- ── Session (Sign out — danger zone) ─────── -->
          <div class="setting-section danger-section">
            <p class="section-title">Session</p>
            <div class="setting-card reveal danger-card">
              <div class="setting-row tappable-row">
                <div class="setting-main">
                  <span class="section-label danger-label">Session</span>
                  <strong class="danger-text">Sign out</strong>
                </div>
                <div class="setting-row-right">
                  <span class="status-pill danger">Careful</span>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--danger, #e05252);"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- Version -->
          <p class="version-label">Gnote v1.0.0</p>

        </div>
      </section>

    </div>

    <style>
      .profile-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 16px;
      }
      .profile-heading {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin: 0;
        color: var(--text, #e8e8e8);
      }
      .profile-hero {
        border-radius: 14px;
      }
      .profile-hero-inner {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .profile-name { margin: 0 0 2px; font-weight: 600; font-size: 16px; }
      .profile-email { margin: 0; }

      /* Tappable rows show right-hand navigation cue */
      .tappable-row { cursor: pointer; }
      .tappable-row:hover { background: rgba(255,255,255,0.03); border-radius: 14px; }
      .setting-row-right {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted, #9a9a9a);
      }

      /* Danger section */
      .danger-section { margin-top: 12px; }
      .danger-card { border-color: rgba(224,82,82,0.2) !important; }
      .danger-label { color: var(--muted, #9a9a9a); }
      .danger-text { color: var(--danger, #e05252) !important; }

      .version-label {
        text-align: center;
        font-size: 10px;
        color: var(--muted, #9a9a9a);
        letter-spacing: 0.05em;
        margin-top: 8px;
      }
    </style>

    <script src="./script.js"></script>
  </body>
</html>
