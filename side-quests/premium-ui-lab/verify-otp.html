<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page">
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <section class="screen">
        <div class="screen-header">
          <div>
            <p class="screen-label">Verify</p>
            <h1 class="title-lg">Check your email</h1>
          </div>
        </div>

        <div class="auth-form reveal">
          <p class="body-copy" style="text-align: center; margin-bottom: 24px;">
            We've sent a 6-digit code to your email address.
          </p>

          <div class="otp-inputs">
            <input class="otp-input" type="text" maxlength="1" />
            <input class="otp-input" type="text" maxlength="1" />
            <input class="otp-input" type="text" maxlength="1" />
            <input class="otp-input" type="text" maxlength="1" />
            <input class="otp-input" type="text" maxlength="1" />
            <input class="otp-input" type="text" maxlength="1" />
          </div>

          <button class="primary-btn full-width">Verify code</button>

          <div class="auth-links">
            <button class="link-btn">Resend code</button>
            <button class="link-btn">Use different email</button>
          </div>
        </div>
      </section>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
