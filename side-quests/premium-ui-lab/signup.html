<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page">
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <section class="screen">
        <div class="screen-header">
          <div>
            <p class="screen-label">Get started</p>
            <h1 class="title-xl">Create your account</h1>
          </div>
        </div>

        <div class="auth-form reveal">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input
              class="form-input"
              type="text"
              placeholder="Your full name"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input
              class="form-input"
              type="email"
              placeholder="your@email.com"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              class="form-input"
              type="password"
              placeholder="••••••••"
            />
          </div>

          <button class="primary-btn full-width">Create account</button>

          <div class="auth-links">
            <button class="link-btn">Already have an account?</button>
          </div>
        </div>
      </section>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
