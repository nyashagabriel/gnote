<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Person</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="prototype-page">
<div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <section class="screen">
        <div class="modal-overlay">
          <div class="modal">
            <div class="modal-header">
              <h2 class="modal-title">Add relationship</h2>
              <button class="icon-btn">×</button>
            </div>

            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Relationship type</label>
                <div class="relationship-select">
                  <button class="relationship-option active" data-type="energizer">
                    Energizer
                  </button>
                  <button class="relationship-option" data-type="relaxer">
                    Relaxer
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Name</label>
                <input
                  class="form-input"
                  type="text"
                  placeholder="Their name"
                />
              </div>

              <div class="form-group">
                <label class="form-label">Contact method</label>
                <select class="form-input">
                  <option>WhatsApp</option>
                  <option>Phone call</option>
                  <option>Email</option>
                  <option>In person</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Check-in frequency</label>
                <select class="form-input">
                  <option>Daily</option>
                  <option>Weekly</option>
                  <option>Monthly</option>
                  <option>Quarterly</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Purpose</label>
                <textarea
                  class="form-input"
                  rows="3"
                  placeholder="Why is this relationship important to you?"
                ></textarea>
              </div>
            </div>

            <div class="modal-footer">
              <button class="secondary-btn">Cancel</button>
              <button class="primary-btn">Add relationship</button>
            </div>
          </div>
        </div>
      </section>

      <nav class="phone-nav">
        <div class="nav-item">Anchor</div>
        <div class="nav-item">Daily 3</div>
        <div class="nav-item">Capture</div>
        <div class="nav-item">Habit</div>
        <div class="nav-item">People</div>
      </nav>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
