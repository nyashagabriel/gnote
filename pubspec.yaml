name: gnote
description: Focus anchor + task manager + habit tracker + responsibility engine.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.19.0"

# ─────────────────────────────────────────────────────────────
# GNOTE — DEPENDENCIES
#
# Runtime:
#   flutter_riverpod  — state management (StateNotifier pattern)
#   go_router         — navigation + auth guard
#   hive_flutter      — offline-first local storage
#   supabase_flutter  — cloud sync + auth
#   awesome_notifications — 5 scheduled daily notifications
#   share_plus        — capture list share sheet
#   url_launcher      — WhatsApp wa.me bridge
#   uuid              — model ID generation
#   intl              — date formatting throughout
#
# Dev:
#   build_runner      — code generation trigger
#   hive_generator    — generates *.g.dart adapters from @HiveType
#
# Going live:
#   Uncomment Supabase.initialize() in main.dart
#   Flip kMockMode / kRouterMockMode flags
#   Run: flutter run --dart-define=SUPABASE_URL=... --dart-define=SUPABASE_ANON_KEY=...
# ─────────────────────────────────────────────────────────────

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.2.0

  # Local storage
  hive_flutter: ^1.1.0

  # Cloud + auth (active once Supabase.initialize() is uncommented)
  supabase_flutter: ^2.5.0

  # Notifications
  awesome_notifications: ^0.10.0

  # Share sheet
  share_plus: ^9.0.0

  # WhatsApp bridge
  url_launcher: ^6.2.0

  # UUID generation
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Add custom fonts here when Stitch delivers final assets.
  # fonts:
